name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    strategy:
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ForgeLSP
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: ForgeLSP
            use-cross: true
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: ForgeLSP
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: ForgeLSP
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ForgeLSP.exe

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        if: matrix.platform.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.platform.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.platform.target }}
          else
            cargo build --release --target ${{ matrix.platform.target }}
          fi
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p release
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} release/
          cd release
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a ../ForgeLSP-${{ matrix.platform.name }}.zip ${{ matrix.platform.bin }}
          else
            tar -czf ../ForgeLSP-${{ matrix.platform.name }}.tar.gz ${{ matrix.platform.bin }}
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-lsp-${{ matrix.platform.name }}
          path: ForgeLSP-${{ matrix.platform.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            forge-lsp-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
